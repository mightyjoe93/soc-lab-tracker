<head>

<title>SOC Analyst Lab Tracker — mightyjoe93</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap');
:root{--bg:#0a0c10;--panel:#0f1318;--border:#1e2a35;--accent:#00e5ff;--accent2:#7c3aed;--accent3:#10b981;--warn:#f59e0b;--danger:#ef4444;--text:#c9d1d9;--muted:#4a5568;--bright:#e2e8f0;--code-bg:#070a0e;--code-border:#243040;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.container{max-width:1100px;margin:0 auto;padding:40px 20px;position:relative;z-index:1;}
header{text-align:center;margin-bottom:40px;padding-bottom:28px;border-bottom:1px solid var(--border);position:relative;}
header::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.header-tag{font-family:'Share Tech Mono',monospace;color:var(--accent);font-size:.75rem;letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;opacity:.8;}
h1{font-family:'Rajdhani',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:700;color:var(--bright);letter-spacing:2px;line-height:1.1;margin-bottom:8px;}
h1 span{color:var(--accent);}
.subtitle{font-family:'Share Tech Mono',monospace;color:var(--muted);font-size:.85rem;letter-spacing:2px;}

/* SYNC BAR */
.sync-bar{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent2);padding:12px 18px;margin-bottom:24px;font-family:'Share Tech Mono',monospace;font-size:.7rem;}
.sync-bar.connected{border-left-color:var(--accent3);}
.sync-bar.error{border-left-color:var(--danger);}
.sync-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.sync-dot.on{background:var(--accent3);box-shadow:0 0 6px var(--accent3);}
.sync-dot.warn{background:var(--warn);box-shadow:0 0 6px var(--warn);}
.sync-label{color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.sync-key-val{color:var(--accent);letter-spacing:3px;font-size:.8rem;}
.sync-actions{display:flex;gap:8px;margin-left:auto;}
.sync-btn{font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:3px 10px;border:1px solid var(--accent2);background:transparent;color:var(--accent2);cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.sync-btn:hover{background:rgba(124,58,237,.15);}
.sync-btn.green{border-color:var(--accent3);color:var(--accent3);}
.sync-btn.green:hover{background:rgba(16,185,129,.1);}
.sync-setup{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:none;}
.sync-setup.open{display:block;}
.setup-step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.setup-num{color:var(--accent);min-width:20px;font-size:.75rem;}
.setup-text{color:var(--text);font-family:'Exo 2',sans-serif;font-size:.8rem;line-height:1.5;}
.setup-text a{color:var(--accent);text-decoration:none;}
.setup-text a:hover{text-decoration:underline;}
.key-input{background:var(--code-bg);border:1px solid var(--border);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.75rem;padding:4px 10px;width:130px;letter-spacing:2px;text-transform:uppercase;outline:none;}
.key-input:focus{border-color:var(--accent2);}
.sync-note{font-family:'Exo 2',sans-serif;font-size:.75rem;color:var(--muted);margin-top:8px;line-height:1.5;}

/* STATS */
.stats-bar{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.stat-box{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);padding:14px 20px;flex:1;min-width:140px;position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(circle,rgba(0,229,255,.05),transparent);}
.stat-label{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.stat-value{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;color:var(--accent);}
.stat-box:nth-child(2){border-left-color:var(--accent2);}
.stat-box:nth-child(2) .stat-value{color:var(--accent2);}
.stat-box:nth-child(3){border-left-color:var(--accent3);}
.stat-box:nth-child(3) .stat-value{color:var(--accent3);}
.stat-box:nth-child(4){border-left-color:var(--warn);}
.stat-box:nth-child(4) .stat-value{color:var(--warn);}

/* PROGRESS */
.progress-wrap{background:var(--panel);border:1px solid var(--border);padding:16px 20px;margin-bottom:28px;}
.progress-label{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--muted);margin-bottom:8px;letter-spacing:1px;}
.progress-track{background:var(--border);height:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .6s ease;position:relative;}
.progress-fill::after{content:'';position:absolute;right:0;top:0;width:20px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4));animation:shimmer 1.5s ease infinite;}
@keyframes shimmer{0%,100%{opacity:.3}50%{opacity:1}}

/* LAB CARDS */
.lab-card{background:var(--panel);border:1px solid var(--border);margin-bottom:14px;transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden;}
.lab-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--muted);transition:background .3s;}
.lab-card.complete::before{background:var(--accent3);}
.lab-card.in-progress::before{background:var(--warn);}
.lab-card.bonus-card::before{background:var(--accent2);}
.lab-card:hover{border-color:rgba(0,229,255,.3);box-shadow:0 0 20px rgba(0,229,255,.05);}
.lab-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;user-select:none;}
.lab-num{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--muted);min-width:34px;}
.lab-num.bonus{color:var(--accent2);font-size:.6rem;}
.lab-title-wrap{flex:1;}
.lab-title{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:600;color:var(--bright);letter-spacing:.5px;}
.lab-meta{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap;}
.badge{font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:2px 7px;border:1px solid;letter-spacing:1px;text-transform:uppercase;}
.badge-time{color:var(--muted);border-color:var(--border);}
.badge-cost{color:var(--accent3);border-color:rgba(16,185,129,.3);}
.badge-score{color:var(--warn);border-color:rgba(245,158,11,.3);}
.badge-score.high{color:var(--accent);border-color:rgba(0,229,255,.3);}
.badge-bonus{color:var(--accent2);border-color:rgba(124,58,237,.4);}
.lab-controls{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.status-btn{font-family:'Share Tech Mono',monospace;font-size:.58rem;padding:3px 9px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:1px;transition:all .2s;text-transform:uppercase;}
.status-btn:hover{border-color:var(--accent);color:var(--accent);}
.status-btn.active-done{border-color:var(--accent3);color:var(--accent3);background:rgba(16,185,129,.08);}
.status-btn.active-wip{border-color:var(--warn);color:var(--warn);background:rgba(245,158,11,.08);}
.expand-icon{color:var(--muted);font-size:.8rem;transition:transform .3s;font-family:'Share Tech Mono',monospace;flex-shrink:0;}
.lab-card.expanded .expand-icon{transform:rotate(180deg);}

/* LAB BODY */
.lab-body{display:none;padding:0 20px 22px 68px;border-top:1px solid var(--border);}
.lab-card.expanded .lab-body{display:block;}
.section-hdr{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
.section-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.simulate-text{font-size:.85rem;color:var(--text);line-height:1.6;padding:10px 14px;background:rgba(0,229,255,.03);border-left:2px solid rgba(0,229,255,.2);}
.info-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px;}
.info-pill{font-family:'Share Tech Mono',monospace;font-size:.62rem;padding:3px 9px;border:1px solid var(--border);color:var(--muted);background:rgba(255,255,255,.02);}
.skills-text{font-size:.8rem;color:var(--muted);font-family:'Share Tech Mono',monospace;margin-top:6px;}

/* STEPS */
.steps-list{display:flex;flex-direction:column;gap:14px;}
.step-item{display:flex;gap:14px;align-items:flex-start;}
.step-num{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--accent2);min-width:26px;padding-top:2px;letter-spacing:1px;}
.step-body{flex:1;min-width:0;}
.step-title{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:600;color:var(--bright);margin-bottom:3px;}
.step-desc{font-size:.82rem;color:var(--text);line-height:1.55;}
.cmd-block{margin-top:8px;background:var(--code-bg);border:1px solid var(--code-border);position:relative;}
.cmd-block pre{padding:9px 50px 9px 12px;overflow-x:auto;}
.cmd-block code{font-family:'Share Tech Mono',monospace;font-size:.73rem;color:#7dd3fc;white-space:pre;display:block;}
.copy-btn{position:absolute;top:6px;right:6px;font-family:'Share Tech Mono',monospace;font-size:.55rem;padding:3px 8px;border:1px solid var(--code-border);background:var(--panel);color:var(--muted);cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{border-color:var(--accent3);color:var(--accent3);}

/* RESUME BULLETS */
.resume-list{display:flex;flex-direction:column;gap:10px;}
.resume-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:rgba(124,58,237,.05);border:1px solid rgba(124,58,237,.2);position:relative;}
.resume-slash{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--accent2);flex-shrink:0;padding-top:1px;}
.resume-text{font-size:.85rem;color:var(--bright);line-height:1.55;flex:1;padding-right:44px;}
.resume-copy{position:absolute;top:10px;right:10px;font-family:'Share Tech Mono',monospace;font-size:.55rem;padding:3px 7px;border:1px solid rgba(124,58,237,.3);background:transparent;color:var(--accent2);cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
.resume-copy:hover{border-color:var(--accent2);background:rgba(124,58,237,.1);}
.resume-copy.copied{border-color:var(--accent3);color:var(--accent3);}
.resume-tip{font-size:.75rem;color:var(--muted);font-family:'Share Tech Mono',monospace;margin-top:10px;padding:8px 12px;border-left:2px solid var(--border);}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;font-family:'Share Tech Mono',monospace;font-size:.7rem;padding:9px 18px;background:var(--panel);border:1px solid var(--accent3);color:var(--accent3);letter-spacing:1px;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}

/* FOOTER */
.footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:1px;line-height:2;}
.footer a{color:var(--accent2);text-decoration:none;}
</style>
</head>

let statuses = {};
let fbRef = null;

function getSyncKey() {
  let k = localStorage.getItem('soc_sync_key');
  if (!k) {
    k = Math.random().toString(36).substring(2,6).toUpperCase() +
        Math.random().toString(36).substring(2,6).toUpperCase();
    localStorage.setItem('soc_sync_key', k);
  }
  return k;
}

function saveLocal() {
  localStorage.setItem('soc_tracker_v3', JSON.stringify(statuses));
}

function loadLocal() {
  const s = localStorage.getItem('soc_tracker_v3');
  if (s) {
    try { statuses = JSON.parse(s); } catch(e){}
  } else {
    // Apply defaults
    LABS.forEach(l => { statuses[l.id] = l.defaultStatus; });
    saveLocal();
  }
}

  const newKey = prompt('Enter sync key from another device (min 6 chars):');
  if (newKey && newKey.trim().length >= 6) {
    localStorage.setItem('soc_sync_key', newKey.trim().toUpperCase());
    showToast('SYNC KEY UPDATED — RELOADING...');
    setTimeout(() => location.reload(), 1200);
  }
}

// ════════════════════════════════════════════════════════════════════
//  STATUS MANAGEMENT
// ════════════════════════════════════════════════════════════════════
function setStatus(labId, status) {
  const current = statuses[labId];
  // Toggle: clicking active status resets to todo
  const next = (current === status) ? 'todo' : status;
  statuses[labId] = next;
  saveLocal();
  if (fbRef) fbRef.child(labId).set(next);
  renderAll();
  showToast(next === 'done' ? '✓ LAB MARKED COMPLETE' : next === 'wip' ? '⟳ MARKED IN PROGRESS' : 'RESET TO TODO');
}

// ════════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(lab) {
  const status = statuses[lab.id] || 'todo';
  const isDone = status === 'done';
  const isWip = status === 'wip';
  const cardClass = ['lab-card',
    isDone ? 'complete' : isWip ? 'in-progress' : '',
    lab.bonus ? 'bonus-card' : ''
  ].filter(Boolean).join(' ');

  const stepsHtml = lab.steps.map((s,i) => {
    const cmd = s[2];
    const cmdHtml = cmd ? `<div class="cmd-block" data-cmd="${encodeURIComponent(cmd)}">
      <pre><code>${esc(cmd)}</code></pre>
      <button class="copy-btn">COPY</button>
    </div>` : '';
    return `<div class="step-item">
      <span class="step-num">${String(i+1).padStart(2,'0')}</span>
      <div class="step-body">
        <div class="step-title">${esc(s[0])}</div>
        <div class="step-desc">${esc(s[1])}</div>
        ${cmdHtml}
      </div>
    </div>`;
  }).join('');

  const resumeHtml = lab.resume.map(b => `
    <div class="resume-item" data-bullet="${encodeURIComponent(b)}">
      <span class="resume-slash">//</span>
      <span class="resume-text">${esc(b)}</span>
      <button class="resume-copy">COPY</button>
    </div>`).join('');

  const scoreClass = lab.valueHigh ? 'high' : '';
  const scoreBadge = lab.bonus
    ? `<span class="badge badge-bonus">BONUS</span>`
    : `<span class="badge badge-score ${scoreClass}">RESUME ${lab.value}</span>`;

  return `<div class="${cardClass}" id="card-${lab.id}">
    <div class="lab-header" onclick="toggleCard('${lab.id}')">
      <span class="lab-num ${lab.bonus?'bonus':''}">${lab.num}</span>
      <div class="lab-title-wrap">
        <div class="lab-title">${esc(lab.title)}</div>
        <div class="lab-meta">
          <span class="badge badge-time">${lab.time}</span>
          <span class="badge badge-cost">${lab.cost}</span>
          ${scoreBadge}
        </div>
      </div>
      <div class="lab-controls">
        <button class="status-btn ${isDone?'active-done':''}" onclick="event.stopPropagation();setStatus('${lab.id}','done')">DONE</button>
        <button class="status-btn ${isWip?'active-wip':''}" onclick="event.stopPropagation();setStatus('${lab.id}','wip')">WIP</button>
      </div>
      <span class="expand-icon">▼</span>
    </div>
    <div class="lab-body">
      <div class="section-hdr">WHAT IT SIMULATES</div>
      <div class="simulate-text">${esc(lab.simulate)}</div>
      <div class="section-hdr">TOOLS &amp; SKILLS</div>
      <div class="info-pills">${lab.tags.map(t=>`<span class="info-pill">${esc(t)}</span>`).join('')}</div>
      <div class="skills-text">${esc(lab.skills)}</div>
      <div class="section-hdr">STEP-BY-STEP GUIDE</div>
      <div class="steps-list">${stepsHtml}</div>
      <div class="section-hdr">RESUME BULLETS</div>
      <div class="resume-list">${resumeHtml}</div>
      <div class="resume-tip">// Personalize these with your actual numbers and findings before adding to your resume.</div>
    </div>
  </div>`;
}

function renderAll() {
  document.getElementById('labs-container').innerHTML = LABS.map(renderCard).join('');
  updateStats();
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  if (el) el.classList.toggle('expanded');
}

function updateStats() {
  const done = LABS.filter(l => (statuses[l.id]||'todo') === 'done').length;
  const wip  = LABS.filter(l => (statuses[l.id]||'todo') === 'wip').length;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-wip').textContent  = wip;
  const pct = Math.round((done / LABS.length) * 100);
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ════════════════════════════════════════════════════════════════════
//  COPY HANDLERS
// ════════════════════════════════════════════════════════════════════
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('copy-btn')) {
    const block = e.target.closest('.cmd-block');
    if (!block) return;
    const text = decodeURIComponent(block.dataset.cmd || '');
    navigator.clipboard.writeText(text).catch(()=>{});
    e.target.textContent = 'DONE';
    e.target.classList.add('copied');
    setTimeout(()=>{ e.target.textContent='COPY'; e.target.classList.remove('copied'); }, 1600);
  }
  if (e.target.classList.contains('resume-copy')) {
    const item = e.target.closest('.resume-item');
    if (!item) return;
    const text = decodeURIComponent(item.dataset.bullet || '');
    navigator.clipboard.writeText(text).catch(()=>{});
    e.target.textContent = 'DONE';
    e.target.classList.add('copied');
    setTimeout(()=>{ e.target.textContent='COPY'; e.target.classList.remove('copied'); }, 1600);
    showToast('RESUME BULLET COPIED');
  }
});

// ════════════════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ════════════════════════════════════════════════════════════════════
//  FIREBASE SYNC
// ════════════════════════════════════════════════════════════════════
function initFirebase(config) {
  renderSyncBar('connecting');
  try {
    firebase.initializeApp(config);
    const db = firebase.database();
    const key = getSyncKey();
    fbRef = db.ref('trackers/' + key + '/labs');

    fbRef.on('value', (snap) => {
      const data = snap.val();
      if (data && typeof data === 'object') {
        statuses = Object.assign({}, statuses, data);
        saveLocal();
        renderAll();
      }
      renderSyncBar('connected');
    }, (err) => {
      console.error('Firebase error:', err);
      renderSyncBar('error');
    });

  } catch(err) {
    console.error('Firebase init error:', err);
    renderSyncBar('error');
  }
}

// ════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════
(function init() {
  loadLocal();
  renderSyncBar(null);
  renderAll();
  if (FIREBASE_CONFIG) {
    initFirebase(FIREBASE_CONFIG);
  }
})();
</script>
</body>
</html>
